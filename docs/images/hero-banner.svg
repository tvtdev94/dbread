<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-labelledby="title">
  <title id="title">dbread - Read-only DB MCP Proxy for AI</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#141931"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2344" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- AI ROBOT (left) -->
  <g transform="translate(140, 200)" filter="url(#softglow)">
    <circle r="70" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
    <circle r="55" fill="#0f1935" stroke="#22d3ee" stroke-width="2.5"/>
    <rect x="-32" y="-30" width="64" height="50" rx="8" fill="#1a2447" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="-14" cy="-8" r="5" fill="#22d3ee"/>
    <circle cx="14" cy="-8" r="5" fill="#22d3ee"/>
    <rect x="-16" y="8" width="32" height="4" rx="2" fill="#22d3ee"/>
    <line x1="0" y1="-30" x2="0" y2="-45" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="0" cy="-50" r="4" fill="#22d3ee"/>
    <text x="0" y="100" text-anchor="middle" fill="#64b5d1" font-family="monospace" font-size="14" font-weight="600">AI CLIENT</text>
  </g>

  <!-- FLOW LINES: AI -> Shield (reads allowed, green) -->
  <g stroke="#22c55e" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M 215 190 L 460 180" stroke-dasharray="6,4"/>
    <polygon points="455,175 470,180 455,185" fill="#22c55e"/>
  </g>
  <text x="340" y="165" fill="#4ade80" font-family="monospace" font-size="12" font-weight="600">SELECT ✓</text>

  <!-- BLOCKED LINE: AI -> Shield (writes denied, red) -->
  <g stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M 215 220 L 440 230" stroke-dasharray="6,4"/>
  </g>
  <g transform="translate(450, 230)" stroke="#ef4444" stroke-width="3" fill="none">
    <circle r="14" fill="#1a0f12" stroke="#ef4444" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6"/>
    <line x1="6" y1="-6" x2="-6" y2="6"/>
  </g>
  <text x="340" y="258" fill="#fca5a5" font-family="monospace" font-size="12" font-weight="600">UPDATE / DROP ✗</text>

  <!-- SHIELD (center) -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <path d="M 0 -80 L 70 -50 L 70 40 Q 70 70 0 90 Q -70 70 -70 40 L -70 -50 Z"
          fill="url(#shield)" stroke="#22d3ee" stroke-width="3" opacity="0.92"/>
    <path d="M 0 -70 L 60 -44 L 60 38 Q 60 62 0 78 Q -60 62 -60 38 L -60 -44 Z"
          fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ffffff" font-family="'Inter', 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="2">dbread</text>
    <text x="0" y="16" text-anchor="middle" fill="#e0f2fe" font-family="'Inter', sans-serif" font-size="11" font-weight="500" letter-spacing="3">MCP · READ-ONLY</text>
    <g transform="translate(0, 40)" fill="#ffffff" opacity="0.85">
      <circle cx="-24" cy="0" r="3"/>
      <circle cx="-8" cy="0" r="3"/>
      <circle cx="8" cy="0" r="3"/>
      <circle cx="24" cy="0" r="3"/>
    </g>
  </g>

  <!-- FLOW LINES: Shield -> DBs (reads) -->
  <g stroke="#22c55e" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M 695 175 L 920 120" stroke-dasharray="5,3"/>
    <path d="M 695 200 L 920 200" stroke-dasharray="5,3"/>
    <path d="M 695 225 L 920 280" stroke-dasharray="5,3"/>
  </g>

  <!-- DATABASES (right) -->
  <g transform="translate(980, 120)" filter="url(#softglow)">
    <ellipse cx="0" cy="0" rx="50" ry="12" fill="url(#db)" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="-50" y="0" width="100" height="30" fill="#5b4fd6"/>
    <ellipse cx="0" cy="30" rx="50" ry="12" fill="#4338ca" stroke="#c4b5fd" stroke-width="1.5"/>
    <ellipse cx="0" cy="15" rx="50" ry="12" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <text x="0" y="20" text-anchor="middle" fill="#f5f3ff" font-family="monospace" font-size="12" font-weight="700">POSTGRES</text>
  </g>

  <g transform="translate(980, 200)" filter="url(#softglow)">
    <ellipse cx="0" cy="0" rx="50" ry="12" fill="url(#db)" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="-50" y="0" width="100" height="30" fill="#5b4fd6"/>
    <ellipse cx="0" cy="30" rx="50" ry="12" fill="#4338ca" stroke="#c4b5fd" stroke-width="1.5"/>
    <ellipse cx="0" cy="15" rx="50" ry="12" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <text x="0" y="20" text-anchor="middle" fill="#f5f3ff" font-family="monospace" font-size="12" font-weight="700">MYSQL</text>
  </g>

  <g transform="translate(980, 280)" filter="url(#softglow)">
    <ellipse cx="0" cy="0" rx="50" ry="12" fill="url(#db)" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="-50" y="0" width="100" height="30" fill="#5b4fd6"/>
    <ellipse cx="0" cy="30" rx="50" ry="12" fill="#4338ca" stroke="#c4b5fd" stroke-width="1.5"/>
    <ellipse cx="0" cy="15" rx="50" ry="12" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <text x="0" y="20" text-anchor="middle" fill="#f5f3ff" font-family="monospace" font-size="12" font-weight="700">SQLITE</text>
  </g>

  <!-- TAGLINE -->
  <text x="600" y="360" text-anchor="middle" fill="#94a3b8" font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="500" letter-spacing="1.5">
    Safe <tspan fill="#22d3ee" font-weight="700">SELECT</tspan> access for AI · 5-layer defense · multi-DB · audited
  </text>
</svg>
