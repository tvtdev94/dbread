<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title">
  <title id="title">dbread architecture</title>
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#141931"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="srvGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a103b"/>
      <stop offset="1" stop-color="#2a1b55"/>
    </linearGradient>
    <linearGradient id="compGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="auditGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <pattern id="gridA" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a2344" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="560" fill="url(#bgA)"/>
  <rect width="1200" height="560" fill="url(#gridA)" opacity="0.5"/>

  <!-- ========== AI CLIENT (LEFT) ========== -->
  <g transform="translate(40, 220)">
    <rect width="170" height="120" rx="12" fill="url(#aiGrad)" stroke="#22d3ee" stroke-width="2"/>
    <text x="85" y="34" text-anchor="middle" fill="#e0f2fe" font-family="'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="1">CLAUDE CODE</text>
    <g transform="translate(85, 75)">
      <rect x="-28" y="-20" width="56" height="44" rx="6" fill="#0b3949" stroke="#22d3ee" stroke-width="1.5"/>
      <circle cx="-11" cy="-4" r="3.5" fill="#22d3ee"/>
      <circle cx="11" cy="-4" r="3.5" fill="#22d3ee"/>
      <rect x="-12" y="9" width="24" height="3" rx="1.5" fill="#22d3ee"/>
      <line x1="0" y1="-20" x2="0" y2="-30" stroke="#22d3ee" stroke-width="1.5"/>
      <circle cx="0" cy="-33" r="2.5" fill="#22d3ee"/>
    </g>
    <text x="85" y="108" text-anchor="middle" fill="#7dd3fc" font-family="monospace" font-size="10">MCP client</text>
  </g>

  <!-- Arrow AI -> Server -->
  <g>
    <path d="M 210 280 L 278 280" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <text x="244" y="270" text-anchor="middle" fill="#7dd3fc" font-family="monospace" font-size="11" font-weight="600">stdio JSON</text>
  </g>

  <!-- ========== DBREAD SERVER (MIDDLE) ========== -->
  <g transform="translate(280, 60)">
    <rect width="560" height="440" rx="16" fill="url(#srvGrad)" stroke="#a855f7" stroke-width="2.5"/>
    <text x="280" y="34" text-anchor="middle" fill="#f5f3ff" font-family="'Inter', sans-serif" font-size="16" font-weight="800" letter-spacing="1">dbread MCP SERVER</text>
    <text x="280" y="52" text-anchor="middle" fill="#c4b5fd" font-family="'Inter', sans-serif" font-size="11" font-style="italic">5-layer defense · single process · stdio</text>

    <!-- Tools node -->
    <g transform="translate(30, 80)">
      <rect width="180" height="96" rx="10" fill="url(#compGrad)" stroke="#818cf8" stroke-width="2"/>
      <text x="90" y="26" text-anchor="middle" fill="#e0e7ff" font-family="'Inter', sans-serif" font-size="13" font-weight="700">🔌 MCP Tools (5)</text>
      <text x="90" y="46" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">list_connections</text>
      <text x="90" y="60" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">list_tables · describe_table</text>
      <text x="90" y="74" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">query · explain</text>
    </g>

    <!-- Guard node -->
    <g transform="translate(350, 80)">
      <rect width="180" height="96" rx="10" fill="url(#compGrad)" stroke="#818cf8" stroke-width="2"/>
      <text x="90" y="26" text-anchor="middle" fill="#e0e7ff" font-family="'Inter', sans-serif" font-size="13" font-weight="700">🔍 SQL Guard</text>
      <text x="90" y="46" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">sqlglot AST walk</text>
      <text x="90" y="60" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">reject DML/DDL/DCL</text>
      <text x="90" y="74" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">auto-inject LIMIT</text>
    </g>

    <!-- Rate Limiter -->
    <g transform="translate(30, 210)">
      <rect width="180" height="82" rx="10" fill="url(#compGrad)" stroke="#818cf8" stroke-width="2"/>
      <text x="90" y="26" text-anchor="middle" fill="#e0e7ff" font-family="'Inter', sans-serif" font-size="13" font-weight="700">⏱️ Rate Limiter</text>
      <text x="90" y="46" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">token bucket</text>
      <text x="90" y="60" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">per-connection</text>
    </g>

    <!-- Connection Manager -->
    <g transform="translate(350, 210)">
      <rect width="180" height="82" rx="10" fill="url(#compGrad)" stroke="#818cf8" stroke-width="2"/>
      <text x="90" y="26" text-anchor="middle" fill="#e0e7ff" font-family="'Inter', sans-serif" font-size="13" font-weight="700">🔗 Engine Manager</text>
      <text x="90" y="46" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">SQLAlchemy 2.x</text>
      <text x="90" y="60" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="10">lazy pool · timeout</text>
    </g>

    <!-- Audit -->
    <g transform="translate(180, 330)">
      <rect width="200" height="78" rx="10" fill="url(#auditGrad)" stroke="#c4b5fd" stroke-width="2"/>
      <text x="100" y="28" text-anchor="middle" fill="#faf5ff" font-family="'Inter', sans-serif" font-size="13" font-weight="700">📝 Audit Log</text>
      <text x="100" y="48" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="10">JSONL · append-only</text>
      <text x="100" y="62" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="10">rotated · every call</text>
    </g>

    <!-- Internal flow arrows -->
    <!-- Tools -> Guard -->
    <path d="M 210 128 L 350 128" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <!-- Guard -> Rate -->
    <path d="M 440 176 Q 440 193 120 193 L 120 210" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <!-- Rate -> Engine -->
    <path d="M 210 251 L 350 251" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <!-- All layers feed Audit (dashed) -->
    <path d="M 120 292 L 120 320 L 250 320 L 250 330" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowPurple)"/>
    <path d="M 440 292 L 440 320 L 320 320 L 320 330" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowPurple)"/>
    <text x="280" y="314" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9" font-style="italic">logs every call</text>
  </g>

  <!-- Arrow Server -> DBs -->
  <g>
    <path d="M 845 280 L 955 280" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="900" y="270" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" font-weight="600">SELECT</text>
  </g>

  <!-- ========== DATABASES (RIGHT) ========== -->
  <g transform="translate(960, 60)">
    <rect width="200" height="440" rx="12" fill="#0f1b1a" stroke="#10b981" stroke-width="2" opacity="0.85"/>
    <text x="100" y="30" text-anchor="middle" fill="#d1fae5" font-family="'Inter', sans-serif" font-size="12" font-weight="700" letter-spacing="1">YOUR DATABASES</text>
    <text x="100" y="48" text-anchor="middle" fill="#6ee7b7" font-family="'Inter', sans-serif" font-size="10" font-style="italic">read-only users only</text>

    <!-- DB cylinders -->
    <g transform="translate(100, 95)">
      <ellipse cx="0" cy="0" rx="55" ry="10" fill="url(#dbGrad)" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="-55" y="0" width="110" height="22" fill="#047857"/>
      <ellipse cx="0" cy="22" rx="55" ry="10" fill="#065f46" stroke="#6ee7b7" stroke-width="1"/>
      <text x="0" y="16" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="11" font-weight="700">PostgreSQL</text>
    </g>
    <g transform="translate(100, 155)">
      <ellipse cx="0" cy="0" rx="55" ry="10" fill="url(#dbGrad)" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="-55" y="0" width="110" height="22" fill="#047857"/>
      <ellipse cx="0" cy="22" rx="55" ry="10" fill="#065f46" stroke="#6ee7b7" stroke-width="1"/>
      <text x="0" y="16" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="11" font-weight="700">MySQL</text>
    </g>
    <g transform="translate(100, 215)">
      <ellipse cx="0" cy="0" rx="55" ry="10" fill="url(#dbGrad)" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="-55" y="0" width="110" height="22" fill="#047857"/>
      <ellipse cx="0" cy="22" rx="55" ry="10" fill="#065f46" stroke="#6ee7b7" stroke-width="1"/>
      <text x="0" y="16" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="11" font-weight="700">SQL Server</text>
    </g>
    <g transform="translate(100, 275)">
      <ellipse cx="0" cy="0" rx="55" ry="10" fill="url(#dbGrad)" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="-55" y="0" width="110" height="22" fill="#047857"/>
      <ellipse cx="0" cy="22" rx="55" ry="10" fill="#065f46" stroke="#6ee7b7" stroke-width="1"/>
      <text x="0" y="16" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="11" font-weight="700">SQLite</text>
    </g>
    <g transform="translate(100, 335)">
      <ellipse cx="0" cy="0" rx="55" ry="10" fill="url(#dbGrad)" stroke="#6ee7b7" stroke-width="1"/>
      <rect x="-55" y="0" width="110" height="22" fill="#047857"/>
      <ellipse cx="0" cy="22" rx="55" ry="10" fill="#065f46" stroke="#6ee7b7" stroke-width="1"/>
      <text x="0" y="16" text-anchor="middle" fill="#ecfdf5" font-family="monospace" font-size="11" font-weight="700">Oracle</text>
    </g>

    <text x="100" y="410" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9">GRANT SELECT only</text>
    <text x="100" y="424" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9">(Layer 0 · mandatory)</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(0, 530)" font-family="monospace" font-size="11">
    <line x1="280" y1="0" x2="320" y2="0" stroke="#22d3ee" stroke-width="2.5"/>
    <text x="330" y="4" fill="#7dd3fc">request flow</text>
    <line x1="450" y1="0" x2="490" y2="0" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="500" y="4" fill="#c4b5fd">audit log</text>
    <line x1="620" y1="0" x2="660" y2="0" stroke="#10b981" stroke-width="2.5"/>
    <text x="670" y="4" fill="#6ee7b7">SELECT only to DB</text>
  </g>
</svg>
