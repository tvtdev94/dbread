name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check src/ tests/

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --extra dev --extra mongo --python ${{ matrix.python-version }}
      - name: Run tests with coverage
        run: uv run pytest --cov=dbread --cov-report=xml --cov-report=term --cov-fail-under=85 -m "not integration"
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration-mongo:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mongo:
        image: mongo:7
        ports:
          - 27019:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootpw
          MONGO_INITDB_DATABASE: dbread_test
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --extra dev --extra mongo
      - name: Install mongosh
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-7.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
      - name: Seed MongoDB
        env:
          ADMIN_URL: mongodb://root:rootpw@localhost:27019/admin?authSource=admin
        run: |
          mongosh "$ADMIN_URL" --quiet --eval '
            const d = db.getSiblingDB("dbread_test");
            d.createUser({user:"ai_ro", pwd:"ro_pw", roles:[{role:"read", db:"dbread_test"}]});
            d.users.insertMany([
              {_id:1, email:"a@x.com", status:"active", age:28},
              {_id:2, email:"b@x.com", status:"inactive", age:35},
              {_id:3, email:"c@x.com", status:"active", age:42, tags:["vip","beta"]}
            ]);
            d.orders.insertMany([
              {_id:1, user_id:1, amount:100, status:"paid"},
              {_id:2, user_id:1, amount:50, status:"refunded"},
              {_id:3, user_id:3, amount:200, status:"paid"}
            ]);
            d.users.createIndex({email:1}, {unique:true});
            d.orders.createIndex({user_id:1});
          '
      - name: Run mongo E2E tests
        env:
          MONGO_URL: mongodb://ai_ro:ro_pw@localhost:27019/dbread_test?authSource=dbread_test
          SKIP_DOCKER: "1"
        run: uv run pytest tests/integration/test_e2e_mongo.py -v

  extras-install-order:
    name: Verify dbread add-extra preserves prior extras
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dbread (postgres only)
        run: uv tool install --force ".[postgres]"

      - name: Verify postgres importable, mongo correctly absent
        run: |
          uv tool run --from dbread python -c "import psycopg2; print('postgres OK')"
          uv tool run --from dbread python -c "
          try:
            import pymongo
            raise SystemExit('FAIL: pymongo should not be installed yet')
          except ModuleNotFoundError:
            print('mongo correctly absent')
          "

      - name: Run dbread add-extra mongo (regression under test)
        run: dbread add-extra mongo

      - name: Verify BOTH postgres + mongo importable after add-extra
        run: |
          uv tool run --from dbread python -c "import psycopg2; import pymongo; print('both OK')"

      - name: Verify state file tracks both extras
        run: |
          echo "--- installed_extras.json ---"
          cat ~/.dbread/installed_extras.json 2>/dev/null || echo "(no state file found)"
          grep -q '"postgres"' ~/.dbread/installed_extras.json
          grep -q '"mongo"' ~/.dbread/installed_extras.json
          echo "State file contains both extras: OK"
