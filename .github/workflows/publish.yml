name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.7.4)'
        required: true

jobs:
  # 1. Sanity-check: tag matches pyproject.toml version + tests pass + lint clean.
  # Catches the bug we hit in v0.7.1 (committed v0.7.1 message but pyproject still 0.7.0).
  verify:
    name: Verify tag, test, lint
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  ->  version: $VERSION"

      - name: Verify pyproject.toml version matches tag
        run: |
          PROJECT_VERSION=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "pyproject.toml version: $PROJECT_VERSION"
          echo "tag version:            ${{ steps.extract.outputs.version }}"
          if [ "$PROJECT_VERSION" != "${{ steps.extract.outputs.version }}" ]; then
            echo "::error::version mismatch — pyproject.toml=$PROJECT_VERSION but tag=${{ steps.extract.outputs.version }}"
            exit 1
          fi

      - name: Verify server.py SERVER_VERSION matches tag
        run: |
          SERVER_VERSION=$(grep -E '^SERVER_VERSION\s*=' src/dbread/server.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "server.py SERVER_VERSION: $SERVER_VERSION"
          if [ "$SERVER_VERSION" != "${{ steps.extract.outputs.version }}" ]; then
            echo "::error::version mismatch — server.py=$SERVER_VERSION but tag=${{ steps.extract.outputs.version }}"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (dev + mongo, mirroring ci.yml test job)
        run: pip install -e ".[dev,mongo]"

      - name: Run unit tests (skip integration; same marker as ci.yml)
        run: pytest -m "not integration" --tb=short

      - name: Lint
        run: ruff check src/

  # 2. Build sdist + wheel
  build:
    name: Build sdist + wheel
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 3. Publish to PyPI using the PYPI_API_TOKEN secret.
  # Gated on the `pypi` environment which has tvtdev94 as a required reviewer —
  # one-click approval prevents accidental tag pushes from yeeting to PyPI.
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dbread
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
