# dbread config - copy to config.yaml and edit.
# Layer 0 security: use ONLY read-only DB users here (see docs/setup-db-readonly.md).
# config.yaml is gitignored - never commit it.

connections:
  analytics_prod:
    url_env: ANALYTICS_PROD_URL        # preferred: load from env var
    dialect: postgres
    rate_limit_per_min: 60
    statement_timeout_s: 30
    max_rows: 1000

  local_mysql:
    url: mysql+pymysql://readonly:pw@localhost/shop  # or inline (less secure)
    dialect: mysql
    rate_limit_per_min: 120
    statement_timeout_s: 15
    max_rows: 500

  local_sqlite:
    url: sqlite:///./sample.db?mode=ro&uri=true
    dialect: sqlite
    rate_limit_per_min: 300
    statement_timeout_s: 10
    max_rows: 2000

audit:
  path: ./audit.jsonl          # supports ~ expansion, e.g. ~/.dbread/audit.jsonl
  rotate_mb: 50                 # rotates current -> .1 -> .2 -> .3 (oldest dropped)
  timezone: UTC                 # IANA name, e.g. "Asia/Bangkok"; unknown -> UTC
  redact_literals: false        # true: SQL literals -> "?" in log (PII hardening)

# Optional: cap total QPM across ALL connections (AND-ed with per-conn limit).
# Defends against rotation attacks where a prompt-injection cycles connection
# names to multiply effective throughput. Leave unset for backward compat.
# global_rate_limit_per_min: 200
