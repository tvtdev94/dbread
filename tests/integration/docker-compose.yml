services:
  pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpw
      POSTGRES_DB: testdb
    ports:
      - "54329:5432"
    volumes:
      - ./fixtures/pg-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 2s
      timeout: 2s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: adminpw
      MYSQL_DATABASE: testdb
    ports:
      - "33069:3306"
    volumes:
      - ./fixtures/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-padminpw"]
      interval: 2s
      timeout: 2s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: testdb
      CLICKHOUSE_USER: ai_readonly
      CLICKHOUSE_PASSWORD: ropw
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "81239:8123"
    volumes:
      - ./fixtures/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
